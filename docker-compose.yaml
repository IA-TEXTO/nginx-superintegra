services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/django_proxy.conf:/etc/nginx/conf.d/django_proxy.conf:ro
      - ${PDFS_HOST_PATH}:/var/www/documentosCar:ro
    environment:
      - CHATBOT_INTEGRACAR_DOMAIN=${CHATBOT_INTEGRACAR_DOMAIN}
      - CHATBOT_INTEGRACAR_UPSTREAM=${CHATBOT_INTEGRACAR_UPSTREAM}
      - WORKSTATIONS_COLATINA_DOMAIN=${WORKSTATIONS_COLATINA_DOMAIN}
      - WORKSTATIONS_COLATINA_UPSTREAM=${WORKSTATIONS_COLATINA_UPSTREAM}
      - FILES_DOMAIN=${FILES_DOMAIN}
    networks:
      - proxy
    restart: unless-stopped

# Networks should be external if the django apps are managed separately
networks:
  proxy:
    external: true
